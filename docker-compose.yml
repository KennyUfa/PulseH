services:
  backend:
    build:
      context: .
      dockerfile: back/Dockerfile
    env_file: .env
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./front
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
